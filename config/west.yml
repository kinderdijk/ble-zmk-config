manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: kinderdijk
      url-base: https://github.com/kinderdijk

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3        # pin to a release; swap to main for bleeding edge
      import: app/west.yml

    - name: zmk-keyboard-penkeebs_split
      remote: kinderdijk
      revision: main

    - name: zmk-rgbled-widget
      url: https://github.com/caksoylar/zmk-rgbled-widget
      revision: v0.3

  self:
    path: config
