# Wireless/BLE
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Split keyboard transport (UART over the TRRS/wireless)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# Power management
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000   # 15 minutes

# USB (for flashing)
CONFIG_ZMK_USB=y

# Optional: RGB underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Optional: display
# CONFIG_ZMK_DISPLAY=y